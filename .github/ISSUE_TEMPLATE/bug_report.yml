name: Bug report
description: Report a reproducible problem in Markora Desktop
title: '[Bug]: '
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the smallest reproducible example and expected behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Markora version
      placeholder: 0.2.2
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and architecture
      placeholder: Windows 11 24H2 x64
    validations:
      required: true
